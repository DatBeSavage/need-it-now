<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feed — Need-It-Now</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/main.css" />
</head>
<body>
  <nav class="nav">
    <div class="nav__inner">
      <a class="brand" href="../index.html">
        <span class="brand__mark">⚡</span>
        <span class="full"><b>Need</b>-<b>It</b><span style="color:var(--ink)">-Now</span></span>
      </a>
      <div class="nav__links">
        <a href="../index.html">Home</a>
        <a href="feed.html" class="active">Browse</a>      </div>
      <div class="nav__user" data-nav-user></div>
    </div>
  </nav>

  <main class="wrap">
    <div class="feed-head">
      <h1>What's near you</h1>
      <p id="result-count">Loading nearby listings…</p>
    </div>

    <div id="flash" class="banner banner--ok" style="display:none">
      ✅ Your listing is live — neighbors in range can see it now.
    </div>

    <div class="controls">
      <div class="controls__row">
        <div class="field control-loc">
          <label for="ctl-zip">📍 Location</label>
          <input class="input" id="ctl-zip" list="zip-list" placeholder="ZIP code" />
          <datalist id="zip-list"></datalist>
        </div>
        <div class="field control-radius">
          <label for="ctl-radius">Within <span class="radius-val" id="radius-val">25</span> miles</label>
          <input type="range" id="ctl-radius" min="1" max="50" value="25" />
        </div>
        <div class="field control-search">
          <label for="ctl-search">Search</label>
          <input class="input" id="ctl-search" type="search" placeholder="Search car, bike, sofa…" />
        </div>
      </div>
      <div class="chips" role="tablist" aria-label="Filter by type">
        <button class="chip active" data-filter="all">Everything</button>
        <button class="chip" data-filter="sell">🏷️ For sale</button>
        <button class="chip" data-filter="buy">🔎 Looking to buy</button>
      </div>
    </div>

    <section id="listings" class="listings" style="margin-bottom:var(--sp-7)"></section>
  </main>

  <script type="module" src="../assets/js/auth.js"></script>
  <script type="module" src="../assets/js/feed.js"></script>
</body>
</html>
