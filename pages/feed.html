<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0d14" />
  <title>Feed — Need-It-Now</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://yubhbztyprfupvjwxwmm.supabase.co" crossorigin />
  <link rel="preconnect" href="https://esm.sh" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/main.css" />
</head>
<body>
  <nav class="nav">
    <div class="nav__inner">
      <a class="brand" href="../index.html">
        <span class="brand__mark">⚡</span>
        <span class="full"><b>Need</b>-<b>It</b><span style="color:var(--ink)">-Now</span></span>
      </a>
      <div class="nav__links">
        <a href="../index.html">Home</a>
        <a href="feed.html" class="active">Browse</a>
        <a href="guidelines.html">Guidelines</a>
      </div>
      <div class="nav__user" data-nav-user></div>
    </div>
  </nav>

  <main class="wrap">
    <div class="feed-head">
      <h1>What's near you</h1>
      <p id="result-count">Loading nearby listings…</p>
    </div>

    <div id="flash" class="banner banner--ok" style="display:none">
      ✅ Your listing is live — neighbors in range can see it now.
    </div>

    <div class="controls" id="controls">
      <div class="filterbar">
        <div class="searchbox">
          <span class="searchbox__icon" aria-hidden="true">🔍</span>
          <input class="searchbox__input" id="ctl-search" type="search"
                 placeholder="Search car, bike, sofa…" aria-label="Search listings" />
        </div>
        <div class="locfield">
          <span class="locfield__pin" aria-hidden="true">📍</span>
          <input class="locfield__input" id="ctl-zip" list="zip-list" inputmode="numeric"
                 placeholder="ZIP" aria-label="Your location ZIP code" />
          <datalist id="zip-list"></datalist>
        </div>
        <label class="distfield">
          <span class="distfield__label">Within</span>
          <select class="distfield__select" id="ctl-radius" aria-label="Search radius">
            <option value="2">2 mi</option>
            <option value="5">5 mi</option>
            <option value="10">10 mi</option>
            <option value="25" selected>25 mi</option>
            <option value="50">50 mi</option>
          </select>
        </label>
      </div>
      <div class="chips" role="tablist" aria-label="Filter by type">
        <button class="chip active" data-filter="all">Everything</button>
        <button class="chip" data-filter="sell">🏷️ For sale</button>
        <button class="chip" data-filter="buy">🔎 Looking to buy</button>
      </div>
    </div>

    <section id="listings" class="listings" style="margin-bottom:var(--sp-7)"></section>
  </main>

  <script type="module" src="../assets/js/auth.js"></script>
  <script type="module" src="../assets/js/feed.js"></script>
</body>
</html>
